version: '3.8'

services:

  # ── SERVICE 1: Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant
    container_name: regumind_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── SERVICE 2: PostgreSQL Database ──
  postgres:
    image: postgres:15
    container_name: regumind_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=regumind123
      - POSTGRES_DB=regumind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SERVICE 3: FastAPI Backend ──
  api:
    build: .
    container_name: regumind_api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://postgres:regumind123@postgres:5432/regumind
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # ── SERVICE 4: Streamlit Dashboard ──
  dashboard:
    build: .
    container_name: regumind_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://regumind_api:8000
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  # ── SERVICE 5: Prometheus ──
  prometheus:
    image: prom/prometheus
    container_name: regumind_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    restart: unless-stopped

  # ── SERVICE 6: Grafana ──
  grafana:
    image: grafana/grafana
    container_name: regumind_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=regumind123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  prometheus_data:
  grafana_data: